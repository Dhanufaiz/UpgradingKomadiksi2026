<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/form.css">
    <title>tari tradisional</title>
</head>
<body>
    <h2>Pengisian pentas-seni</h2>
    <form id="my-form" method="POST" action="https://script.google.com/macros/s/AKfycbxl5fRQ8BGAPhKnLPutnRKMZglf4EzhoTkl5lgkqJ6MZTfBwo4hfhOXXRgOuE0x2W3TUw/exec">
        <input type="text" name="nama" placeholder="Nama Lengkap" required>
        <select name="bidang" id="bidang" required>
            <option value="">--Pilih--</option>
            <option value="Sekretaris umum">Sekretaris umum</option>
            <option value="Bendahara umum">Bendahara umum</option>
            <option value="Pengabdian masyarakat">pengabdian masyarakat</option>
            <option value="Hubungan internal">Hubungan internal</option>
            <option value="Hubungan eksternal">Hubungan eksternal</option>
            <option value="Minat bakat">Minat & bakat</option>
            <option value="Media dan informasi">Media dan informasi</option>
        </select>
        <select name="jenis" id="jenis" required>
            <option value="">jenis pensi</option>
            <option value="Tari tradisional"> Tari Tradisional</option>
            <option value="Tari modern">Tari Modern</option>
            <option value="Drama musikal">Drama Musikal</option>
            <option value="Drama komedi">Drama Komedi</option>
        </select>

        <button type="submit" id="btn-submit">Kirim</button>
    </form>
    <hr>
        <h3>Daftar Pendaftar Pentas Seni</h3>
        <table border="1" id="tabel-data">
            <thead>
                <tr>
                    <th>Bidang</th>
                    <th>Jenis Pensi</th>
                </tr>
            </thead>
            <tbody id="isi-tabel">
                </tbody>
        </table>

        <button onclick="ambilData()">Refresh Data</button>
    <script>
        // 1. KONFIGURASI
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxl5fRQ8BGAPhKnLPutnRKMZglf4EzhoTkl5lgkqJ6MZTfBwo4hfhOXXRgOuE0x2W3TUw/exec';
        const form = document.getElementById('my-form');
        const btnSubmit = document.getElementById('btn-submit');
        const isiTabel = document.getElementById('isi-tabel');

        // Batasan kuota (Harus sama dengan yang ada di Apps Script)
        const limits = {
            "Tari tradisional": 1,
            "Tari modern": 2,
            "Drama musikal": 2,
            "Drama komedi": 2
        };

        // 2. FUNGSI AMBIL DATA & CEK KUOTA (GET)
        function refreshData() {
            fetch(scriptURL)
                .then(response => response.json())
                .then(data => {
                    // Tampilkan ke Tabel
                    isiTabel.innerHTML = "";
                    const rekap = {}; // Untuk hitung jumlah per jenis

                    data.forEach(item => {
                        // Hitung jumlah pendaftar per jenis untuk limitasi
                        rekap[item.jenis] = (rekap[item.jenis] || 0) + 1;

                        // Tambah baris ke tabel
                        let row = `<tr>
                            <td>${item.bidang}</td>
                            <td>${item.jenis}</td>
                        </tr>`;
                        isiTabel.innerHTML += row;
                    });

                    // Update Dropdown berdasarkan kuota
                    updateDropdownLimits(rekap);
                })
                .catch(error => {
                    console.error('Error saat ambil data:', error);
                    isiTabel.innerHTML = "<tr><td colspan='3'>Gagal memuat data.</td></tr>";
                });
        }

        // 3. FUNGSI UPDATE DROPDOWN
        function updateDropdownLimits(rekap) {
            const selectJenis = document.getElementById('jenis');
            const options = selectJenis.options;

            for (let i = 0; i < options.length; i++) {
                const val = options[i].value;
                if (limits[val] !== undefined) {
                    const terisi = rekap[val] || 0;
                    const sisa = limits[val] - terisi;

                    if (sisa <= 0) {
                        options[i].disabled = true;
                        options[i].text = val + " (PENUH)";
                        options[i].classList.add('full');
                    } else {
                        options[i].disabled = false;
                        options[i].text = val + " (Sisa: " + sisa + ")";
                    }
                }
            }
        }

        // 4. FUNGSI KIRIM DATA (POST)
        form.addEventListener('submit', e => {
            e.preventDefault();
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = "Sedang Mengirim...";

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => response.json())
                .then(result => {
                    if (result.result === 'success') {
                        alert("Berhasil mendaftar!");
                        form.reset();
                        refreshData(); // Segarkan tabel dan kuota
                    } else {
                        alert("Gagal: " + result.error);
                    }
                })
                .catch(error => {
                    alert("Terjadi kesalahan koneksi!");
                    console.error('Error!', error.message);
                })
                .finally(() => {
                    btnSubmit.disabled = false;
                    btnSubmit.innerHTML = "Kirim Pendaftaran";
                });
        });

        // Jalankan saat pertama kali dibuka
        window.onload = refreshData;

    </script>
</body>
</html>
