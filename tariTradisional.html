<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/form.css">
    <title>tari tradisional</title>
</head>
<body>
    <h2>Pengisian pentas-seni</h2>
    <form id="my-form" method="POST" action="https://script.google.com/macros/s/AKfycbxl5fRQ8BGAPhKnLPutnRKMZglf4EzhoTkl5lgkqJ6MZTfBwo4hfhOXXRgOuE0x2W3TUw/exec">
        <input type="text" name="nama" placeholder="Nama Lengkap" required>
        <select name="bidang" id="bidang" required>
            <option value="">--Pilih--</option>
            <option value="Sekretaris umum">Sekretaris umum</option>
            <option value="Bendahara umum">Bendahara umum</option>
            <option value="Pengabdian masyarakat">pengabdian masyarakat</option>
            <option value="Hubungan internal">Hubungan internal</option>
            <option value="Hubungan eksternal">Hubungan eksternal</option>
            <option value="Minat bakat">Minat & bakat</option>
            <option value="Media dan informasi">Media dan informasi</option>
        </select>
        <select name="jenis" id="jenis" required>
            <option value="">jenis pensi</option>
            <option value="Tari tradisional"> Tari Tradisional</option>
            <option value="Tari modern">Tari Modern</option>
            <option value="Drama musikal">Drama Musikal</option>
            <option value="Drama komedi">Drama Komedi</option>
        </select>

        <button type="submit" id="btn-submit">Kirim</button>
    </form>
    <hr>
        <h3>Daftar Pendaftar Pentas Seni</h3>
        <table border="1" id="tabel-data">
            <thead>
                <tr>
                    <th>Bidang</th>
                    <th>Jenis Pensi</th>
                    <th>waktu</th>
                </tr>
            </thead>
            <tbody id="isi-tabel">
                </tbody>
        </table>

        <button onclick="refreshData()">Refresh Data</button>
    <script>
        // URL Web App Google Apps Script
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxl5fRQ8BGAPhKnLPutnRKMZglf4EzhoTkl5lgkqJ6MZTfBwo4hfhOXXRgOuE0x2W3TUw/exec';
        
        const form = document.getElementById('my-form');
        const btnSubmit = document.getElementById('btn-submit');
        const isiTabel = document.getElementById('isi-tabel');

        // Setting Limit per Jenis Pensi
        const kuotaJenis = {
            "Tari tradisional": 1,
            "Tari modern": 2,
            "Drama musikal": 2,
            "Drama komedi": 2
        };

        // 1. Fungsi Mengambil Data & Mengunci Pilihan (GET)
        function refreshData() {
        fetch(scriptURL)
            .then(response => response.json())
            .then(data => {
                isiTabel.innerHTML = "";
                const rekapJenis = {};
                const bidangTerisi = [];

                // Pastikan kolom di Sheets bernama 'Date' agar sorting ini bekerja
                data.sort((a, b) => new Date(b.Date) - new Date(a.Date));

                data.forEach(item => {
                    rekapJenis[item.jenis] = (rekapJenis[item.jenis] || 0) + 1;
                    bidangTerisi.push(item.bidang);

                    // LOGIKA PERBAIKAN WAKTU:
                    // Jika di Sheets kolomnya bernama 'Date', maka gunakan item.Date
                    const waktuData = item.Date || item.date; // Antisipasi huruf kecil
                    const waktu = waktuData ? new Date(waktuData).toLocaleTimeString('id-ID') : '-';

                    let row = `<tr>
                        <td>${item.bidang || '-'}</td>
                        <td>${item.jenis || '-'}</td>
                        <td>${waktu}</td>
                    </tr>`;
                    isiTabel.innerHTML += row;
                });

                updateSelectionLimits(rekapJenis, bidangTerisi);
            })
            // ... (sisa kode tetap sama) ...
    }
        // 2. Fungsi Logika Limit (Visual)
        function updateSelectionLimits(rekapJenis, bidangTerisi) {
            // Update Limit Bidang
            const optBidang = document.getElementById('bidang').options;
            for (let i = 0; i < optBidang.length; i++) {
                if (bidangTerisi.includes(optBidang[i].value)) {
                    optBidang[i].disabled = true;
                    optBidang[i].text = optBidang[i].value + " (SUDAH DAFTAR)";
                }
            }

            // Update Limit Jenis Pensi
            const optJenis = document.getElementById('jenis').options;
            for (let j = 0; j < optJenis.length; j++) {
                const val = optJenis[j].value;
                if (kuotaJenis[val]) {
                    const sisa = kuotaJenis[val] - (rekapJenis[val] || 0);
                    if (sisa <= 0) {
                        optJenis[j].disabled = true;
                        optJenis[j].text = val + " (PENUH)";
                    } else {
                        optJenis[j].disabled = false;
                        optJenis[j].text = val + " (Sisa: " + sisa + ")";
                    }
                }
            }
        }

        // 3. Fungsi Kirim Data (POST)
        form.addEventListener('submit', e => {
            e.preventDefault();
            
            // Langsung disable tombol agar tidak double-click saat war
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = "Memproses Antrean...";

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => response.json())
                .then(result => {
                    if (result.result === 'success') {
                        alert("SELAMAT! Pendaftaran Anda berhasil masuk.");
                        form.reset();
                        refreshData();
                    } else {
                        alert("GAGAL: " + result.error);
                        refreshData();
                    }
                })
                .catch(error => {
                    alert("Koneksi sibuk/terputus. Silakan coba lagi.");
                    console.error('Error!', error.message);
                })
                .finally(() => {
                    btnSubmit.disabled = false;
                    btnSubmit.innerHTML = "KIRIM PENDAFTARAN";
                });
        });

        // Jalankan refresh data saat halaman dibuka
        window.onload = refreshData;

        // Opsional: Auto-refresh tabel setiap 10 detik agar peserta bisa lihat pergerakan war
        setInterval(refreshData, 10000);
    </script>
</body>
</html>
