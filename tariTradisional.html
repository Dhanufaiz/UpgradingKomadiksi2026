<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/form.css">
    <title>tari tradisional</title>
</head>
<body>
    <h2>Pengisian pentas-seni</h2>
    <form id="my-form" method="POST" action="https://script.google.com/macros/s/AKfycbxl5fRQ8BGAPhKnLPutnRKMZglf4EzhoTkl5lgkqJ6MZTfBwo4hfhOXXRgOuE0x2W3TUw/exec">
        <input type="text" name="nama" placeholder="Nama Lengkap" required>
        <select name="bidang" id="bidang" required>
            <option value="">--Pilih--</option>
            <option value="Sekretaris umum">Sekretaris umum</option>
            <option value="Bendahara umum">Bendahara umum</option>
            <option value="Pengabdian masyarakat">pengabdian masyarakat</option>
            <option value="Hubungan internal">Hubungan internal</option>
            <option value="Hubungan eksternal">Hubungan eksternal</option>
            <option value="Minat bakat">Minat & bakat</option>
            <option value="Media dan informasi">Media dan informasi</option>
        </select>
        <select name="jenis" id="jenis" required>
            <option value="">jenis pensi</option>
            <option value="Tari tradisional"> Tari Tradisional</option>
            <option value="Tari modern">Tari Modern</option>
            <option value="Drama musikal">Drama Musikal</option>
            <option value="Drama komedi">Drama Komedi</option>
        </select>

        <button type="submit" id="btn-submit">Kirim</button>
    </form>
    <hr>
        <h3>Daftar Pendaftar Pentas Seni</h3>
        <table border="1" id="tabel-data">
            <thead>
                <tr>
                    <th>Bidang</th>
                    <th>Jenis Pensi</th>
                </tr>
            </thead>
            <tbody id="isi-tabel">
                </tbody>
        </table>

        <button onclick="ambilData()">Refresh Data</button>
    <script>
        // 1. KONFIGURASI (GANTI URL INI)
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxl5fRQ8BGAPhKnLPutnRKMZglf4EzhoTkl5lgkqJ6MZTfBwo4hfhOXXRgOuE0x2W3TUw/exec';
        
        const form = document.getElementById('my-form');
        const btnSubmit = document.getElementById('btn-submit');
        const isiTabel = document.getElementById('isi-tabel');

        // Definisi Limit Kuota Jenis Pensi
        const kuotaJenis = {
            "Tari tradisional": 1,
            "Tari modern": 2,
            "Drama musikal": 2,
            "Drama komedi": 2
        };

        // 2. FUNGSI UTAMA: AMBIL DATA & UPDATE LIMIT
        function refreshData() {
            fetch(scriptURL)
                .then(response => response.json())
                .then(data => {
                    isiTabel.innerHTML = "";
                    
                    const rekapJenis = {};  // Untuk menghitung jumlah per jenis
                    const bidangTerisi = []; // Untuk mencatat bidang yang sudah daftar

                    data.forEach(item => {
                        // Hitung jumlah untuk limit jenis
                        rekapJenis[item.jenis] = (rekapJenis[item.jenis] || 0) + 1;
                        
                        // Catat bidang untuk limit bidang
                        bidangTerisi.push(item.bidang);

                        // Render ke tabel
                        let row = `<tr>
                            <td>${item.bidang}</td>
                            <td>${item.jenis}</td>
                        </tr>`;
                        isiTabel.innerHTML += row;
                    });

                    // Jalankan fungsi pengunci pilihan
                    terapkanLimitasi(rekapJenis, bidangTerisi);
                })
                .catch(error => {
                    console.error('Error:', error);
                    isiTabel.innerHTML = "<tr><td colspan='3'>Gagal memuat data.</td></tr>";
                });
        }

        // 3. FUNGSI PENGUNCI (LIMITASI)
        function terapkanLimitasi(rekapJenis, bidangTerisi) {
            // --- Limitasi Bidang (Hanya 1x) ---
            const optionsBidang = document.getElementById('bidang').options;
            for (let i = 0; i < optionsBidang.length; i++) {
                const valB = optionsBidang[i].value;
                if (bidangTerisi.includes(valB)) {
                    optionsBidang[i].disabled = true;
                    optionsBidang[i].text = valB + " (SUDAH DAFTAR)";
                }
            }

            // --- Limitasi Jenis Pensi (Kuota) ---
            const optionsJenis = document.getElementById('jenis').options;
            for (let j = 0; j < optionsJenis.length; j++) {
                const valJ = optionsJenis[j].value;
                if (kuotaJenis[valJ] !== undefined) {
                    const terisi = rekapJenis[valJ] || 0;
                    const sisa = kuotaJenis[valJ] - terisi;

                    if (sisa <= 0) {
                        optionsJenis[j].disabled = true;
                        optionsJenis[j].text = valJ + " (PENUH)";
                    } else {
                        optionsJenis[j].disabled = false;
                        optionsJenis[j].text = valJ + " (Sisa: " + sisa + ")";
                    }
                }
            }
        }

        // 4. FUNGSI KIRIM DATA
        form.addEventListener('submit', e => {
            e.preventDefault();
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = "Sedang Mengirim...";

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => response.json())
                .then(result => {
                    if (result.result === 'success') {
                        alert("Berhasil mendaftar!");
                        form.reset();
                        refreshData(); // Refresh otomatis agar limit terupdate
                    } else {
                        alert("Gagal: " + result.error);
                    }
                })
                .catch(error => {
                    alert("Kesalahan koneksi!");
                    console.error('Error!', error.message);
                })
                .finally(() => {
                    btnSubmit.disabled = false;
                    btnSubmit.innerHTML = "Kirim Pendaftaran";
                });
        });

        // Jalankan saat load pertama kali
        window.onload = refreshData;
    </script>
</body>
</html>
