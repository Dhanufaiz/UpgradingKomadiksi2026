<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tari tradisional</title>
</head>
<body>
    <h2>Pengisian pentas-seni</h2>
    <form id="my-form" method="POST" action="https://script.google.com/macros/s/AKfycbxl5fRQ8BGAPhKnLPutnRKMZglf4EzhoTkl5lgkqJ6MZTfBwo4hfhOXXRgOuE0x2W3TUw/exec">
        <input type="text" name="nama" placeholder="Nama Lengkap" required>
        <select name="bidang" id="bidang" required>
            <option value="">--Pilih--</option>
            <option value="Sekretaris umum">Sekretaris umum</option>
            <option value="Bendahara umum">Bendahara umum</option>
            <option value="Pengabdian masyarakat">pengabdian masyarakat</option>
            <option value="Hubungan internal">Hubungan internal</option>
            <option value="Hubungan eksternal">Hubungan eksternal</option>
            <option value="Minat bakat">Minat & bakat</option>
            <option value="Media dan informasi">Media dan informasi</option>
        </select>
        <select name="jenis" id="jenis" required>
            <option value="">jenis pensi</option>
            <option value="Tari tradisional"> Tari Tradisional</option>
            <option value="Tari modern">Tari Modern</option>
            <option value="Drama musikal">Drama Musikal</option>
            <option value="Drama komedi">Drama Komedi</option>
        </select>

        <button type="submit">Kirim</button>
    </form>
    <hr>
        <h3>Daftar Pendaftar Pentas Seni</h3>
        <table border="1" id="tabel-data">
            <thead>
                <tr>
                    <th>Nama</th>
                    <th>Bidang</th>
                    <th>Jenis Pensi</th>
                </tr>
            </thead>
            <tbody id="isi-tabel">
                </tbody>
        </table>

        <button onclick="ambilData()">Refresh Data</button>
    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxl5fRQ8BGAPhKnLPutnRKMZglf4EzhoTkl5lgkqJ6MZTfBwo4hfhOXXRgOuE0x2W3TUw/exec'
        const form = document.getElementById('my-form')

        form.addEventListener('submit', e => {
          e.preventDefault()
          fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => alert("Terima kasih! Data berhasil dikirim."))
            .catch(error => console.error('Error!', error.message))
        })

        function ambilData() {
            const isiTabel = document.getElementById('isi-tabel');
            isiTabel.innerHTML = "<tr><td colspan='3'>Memuat data...</td></tr>";

            fetch(scriptURL) // scriptURL adalah URL Web App yang sama
                .then(response => response.json())
                .then(data => {
                    isiTabel.innerHTML = ""; // Bersihkan pesan memuat
                    
                    data.forEach(row => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${row.nama || '-'}</td>
                            <td>${row.bidang || '-'}</td>
                            <td>${row.jenis || '-'}</td>
                        `;
                        isiTabel.appendChild(tr);
                    });
                })
                .catch(error => {
                    console.error('Error:', error);
                    isiTabel.innerHTML = "<tr><td colspan='3'>Gagal mengambil data.</td></tr>";
                });
        }

        // Jalankan fungsi saat halaman pertama kali dibuka
        window.onload = ambilData;
    </script>
</body>
</html>
